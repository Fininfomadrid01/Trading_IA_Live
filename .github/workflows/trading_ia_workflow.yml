name: Agente de Actualizacion Trading IA

on:
  schedule:
    # Se ejecuta de lunes a viernes a las 18:30 CET (17:30 UTC)
    - cron: '30 17 * * 1-5'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Activa el cache automático de dependencias

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Actualizador de IA
        run: python actualizador_nube.py

      - name: Guardar cambios en la Base de Datos
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cache_predicciones_LIVE.npz
          git commit -m "Actualizacion automatica diaria: $(date +'%Y-%m-%d')" || echo "No hay cambios que guardar"
          git push
