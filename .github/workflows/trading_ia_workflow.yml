name: Agente de Actualizacion Trading IA

on:
  schedule:
    - cron: '30 17 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r requirements.txt

      - name: Ejecutar Motor de Inferencia Global
        run: python github_automation/generador_inferencia_LIVE.py

      - name: Generar Dashboard Visual
        run: python github_automation/generador_reporte.py

      - name: Guardar cambios y Dashboard
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cache_predicciones_LIVE.npz README.md
          git commit -m "Actualizacion automatica: Dashboard e Inteligencia [Skip CI]" || echo "No hay cambios"
          git push
