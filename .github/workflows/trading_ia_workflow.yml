name: Agente de Actualizacion Trading IA

on:
  schedule:
    - cron: '30 17 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance

      - name: Generar Dashboard Visual
        run: python generador_reporte.py

      - name: Guardar cambios y Dashboard
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "Dashboard Global Actualizado: $(date +'%Y-%m-%d')" || echo "Sin cambios"
          git push
